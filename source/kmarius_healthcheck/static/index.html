<!DOCTYPE html>
<html lang="en">
<style>
    /* sans-serif everywhere */
    body {
        font-family: sans-serif;
        font-size: 15px;
    }

    /* taken from the datatables stylesheet */
    th input {
        width: 90%;
        border: 1px solid #aaa;
        border-radius: 3px;
        padding: 5px;
        background-color: transparent;
        color: inherit;
        margin-left: 3px
    }

    /* dark mode text color */
    html.dark {
        color: #dae0e7;
    }

    /* also from datatables */
    html.dark th input {
        border: 1px solid rgba(255, 255, 255, 0.2);
        background-color: var(--dt-html-background)
    }
</style>
<head>
    <title>Healthcheck | Unmanic</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.7/css/dataTables.dataTables.min.css"/>
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/3.2.6/css/buttons.dataTables.min.css"/>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script defer src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
    <script defer src="https://cdn.datatables.net/buttons/3.2.6/js/dataTables.buttons.min.js"></script>
    <script>
        // handle theme
        const urlParams = new URLSearchParams(window.location.search);
        let html = document.querySelector('html');
        html.classList.add(urlParams.get('theme'));
        html.setAttribute('data-bs-theme', urlParams.get('theme'));

        // watches localstorage for changes on the 'theme' key by quasar
        // changes theme with a tiny delay, but better than nothing
        // the downside is that it will also fire for other tabs which have not registered the theme change
        // works once the key has been stored
        window.addEventListener('storage', function (e) {
                if (e.key === 'theme') {
                    let theme = e.newValue.replace('__q_strn|', '');
                    document.querySelector('html')
                        .classList.replace(theme === 'light' ? 'dark' : 'light', theme);
                }
            }, false
        );

        let match = window.location.href.match(/\/unmanic\/panel\/([^\/]+)\//);
        if (match == null)
            throw new Error("Could not determine plugin ID");
        const PLUGIN_ID = match[1];

        function buildUrl(path) {
            return "/unmanic/plugin_api/" + PLUGIN_ID + path;
        }

        let filter_library_id = null;
        let filter_resolved = 0;

        // replaced with actual libraries in plugin.py
        let LIBRARIES = [];

        function libraryButtons() {
            let buttons = [
                {
                    text: 'All',
                    action: function (e, dt, node, config) {
                        filter_library_id = null;

                        $('#issueTable').DataTable().ajax.reload();
                        $('#issueTable').DataTable().buttons(1).text("All libraries");
                    }
                },
            ];
            for (let lib of LIBRARIES) {
                buttons.push({
                        text: lib.name,
                        action: function (e, dt, node, config) {
                            filter_library_id = lib.id;
                            $('#issueTable').DataTable().ajax.reload();
                            $('#issueTable').DataTable().buttons(1).text(lib.name);
                        }
                    },
                )
            }
            return buttons;
        }

        document.addEventListener('DOMContentLoaded', () => {

            // Setup - add a text input to each footer cell
            // we only allow filtering for name and issues, the first two columns
            $('#issueTable tfoot th').each(function (i) {
                if (i < 2) {
                    let title = $('#issueTable thead th')
                        .eq($(this).index())
                        .text();
                    $(this).html(
                        '<input type="text" placeholder="Filter ' + title + '" data-index="' + i + '" />'
                    );
                }
            });

            let table = new DataTable('#issueTable', {
                serverSide: true,
                ajax: {
                    url: buildUrl('/data-source'),
                    data: function (d) {
                        return $.extend({}, d, {
                            library_id: filter_library_id,
                            show_resolved: filter_resolved,
                        });
                    }
                },
                searchDelay: 200,
                layout: {
                    topStart: {
                        buttons: [
                            "pageLength",
                            {
                                extend: 'collection',
                                text: 'All libraries',
                                autoClose: true,
                                buttons: libraryButtons(),
                            },
                            {
                                extend: 'collection',
                                text: 'Show only unresolved',
                                autoClose: true,
                                buttons: [
                                    {
                                        text: 'Show all',
                                        action: function (e, dt, node, config) {
                                            filter_resolved = null;
                                            $('#issueTable').DataTable().ajax.reload();
                                            $('#issueTable').DataTable().buttons(2).text('Show all');
                                        }
                                    },
                                    {
                                        text: 'Show only resolved',
                                        action: function (e, dt, node, config) {
                                            filter_resolved = 1;
                                            $('#issueTable').DataTable().ajax.reload();
                                            $('#issueTable').DataTable().buttons(2).text('Show only resolved');
                                        }
                                    },
                                    {
                                        text: 'Show only unresolved',
                                        action: function (e, dt, node, config) {
                                            filter_resolved = 0;
                                            $('#issueTable').DataTable().ajax.reload();
                                            $('#issueTable').DataTable().buttons(2).text('Show only unresolved');
                                        }
                                    },
                                ]
                            }
                        ]
                    },
                },
                columns: [
                    {data: 'name'},
                    {data: 'issues'},
                    {data: 'date'},
                    {data: 'resolved'},
                ],
                rowCallback: function (row, data) {
                    // add path tooltip to the first column
                    $(row.firstChild).attr('title', $(row).data('path'));
                    $(row.lastChild).attr('title', 'Click to toggle');
                },
            });

            // filter on columns with debounce
            $(table.table().container()).on('keyup', 'tfoot input', DataTable.util.debounce(function () {
                table
                    .column($(this).data('index'))
                    .search(this.value)
                    .draw();
            }, 200));

            // click last cell to resolve/unresolve
            $('#issueTable tbody').on('click', 'td', async function () {
                let cell = table.cell(this);
                if (cell.index().column !== 3)
                    return;

                let rowid = $(table.row(this).node()).data('rowid');

                await fetch(buildUrl("/resolve"), {
                    method: "POST",
                    body: JSON.stringify({
                        rowid: rowid,
                        resolve: !cell.data(),
                    }),
                    headers: {
                        "Content-type": "application/json"
                    }
                });

                cell.draw();
            });
        });
    </script>
</head>
<body>
<div class="flex-container">
    <table id="issueTable" class="display">
        <thead>
        <tr>
            <th>Filename</th>
            <th>Issues</th>
            <th>Last Check</th>
            <th>Resolved</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>Row 1 Data 1</td>
            <td>Row 1 Data 2</td>
            <td>Row 1 Data 3</td>
            <td>Row 1 Data 4</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <th></th>
            <th></th>
            <th></th>
            <th></th>
        </tr>
        </tfoot>
    </table>
</div>
</body>
</html>
